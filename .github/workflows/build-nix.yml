name: Build with Nix

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "flake.nix"
      - "flake.lock"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "flake.nix"
      - "flake.lock"
  workflow_dispatch:

env:
  CACHIX_CACHE_NAME: siiway

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            system: x86_64-linux
          - goos: linux
            goarch: arm64
            system: aarch64-linux
          - goos: darwin
            goarch: amd64
            system: x86_64-darwin
          - goos: darwin
            goarch: arm64
            system: aarch64-darwin
          - goos: windows
            goarch: amd64
            system: x86_64-windows
          - goos: windows
            goarch: arm64
            system: aarch64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system = x86_64-linux

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GIT_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Build with Nix
        run: |
          set -euo pipefail
          mkdir -p bin

          OUTPUT_NAME="siiway-cli-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi

          # Build with Nix using cross-compilation
          nix build .#legacyPackages.${{ matrix.system }}.siiway-cli --print-build-logs

          # Copy binary to bin directory with correct name
          cp result/bin/siiway-cli "bin/${OUTPUT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: siiway-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/siiway-cli-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: 30
